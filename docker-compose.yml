version: "3.9"

services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://server:8000
    depends_on:
      - server